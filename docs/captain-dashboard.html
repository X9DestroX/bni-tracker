<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captain Dashboard - BNI Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="toast" id="toast"></div>

<nav class="bg-white p-3 flex justify-between">
    <div class="flex gap-2 items-center">
        <span class="bg-red-600 text-white px-2 py-1 text-xs font-bold">BNI</span>
        <span class="font-semibold">MC Tracker</span>
    </div>

    <!-- LOGOUT FORM -->
    <form id="logout-form">
        <button type="submit" class="text-red-500">Logout</button>
    </form>
</nav>

<div class="p-4">

    <!-- ADD MEMBER FORM -->
    <form id="add-member-form" class="bg-white p-4 mb-4 rounded shadow">
        <div class="flex gap-2">
            <input id="new-member-name" placeholder="Member Name" required class="border p-2 w-full">
            <button type="submit" class="bg-black text-white px-4">Add</button>
        </div>
    </form>

    <h2 class="text-lg font-semibold mb-2">Weekly Attendance</h2>

    <div id="member-list"></div>

</div>

<!-- SUBMIT FORM -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white">
    <form id="attendance-form">
        <button type="submit" class="bg-red-500 text-white w-full py-3">
            Submit Team Attendance
        </button>
    </form>
</div>

<script type="module">

import { db, auth } from './db/firebase-config.js';
import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
    collection, addDoc, query, where, getDocs,
    deleteDoc, doc, writeBatch, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const listContainer = document.getElementById("member-list");
const state = {};

// Ensure teamId exists
if (!localStorage.getItem("teamId")) {
    localStorage.setItem("teamId", "TEAM1");
}

// ADD MEMBER
document.getElementById("add-member-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const input = document.getElementById("new-member-name");
    const name = input.value.trim();
    const teamId = localStorage.getItem("teamId");

    try {
        await addDoc(collection(db, "members"), {
            memberName: name,
            teamId: teamId,
            createdAt: serverTimestamp()
        });

        input.value = "";
        alert("Member added");
        loadData();

    } catch (err) {
        alert(err.message);
    }
});

// LOAD MEMBERS
async function loadData() {
    const teamId = localStorage.getItem("teamId");

    const q = query(collection(db, "members"), where("teamId", "==", teamId));
    const snap = await getDocs(q);

    listContainer.innerHTML = "";

    if (snap.empty) {
        listContainer.innerHTML = "<p>No members yet</p>";
        return;
    }

    snap.forEach(docSnap => {
        const data = docSnap.data();
        const id = docSnap.id;

        state[id] = { present: true, name: data.memberName };

        const div = document.createElement("div");
        div.className = "bg-white p-3 mb-2";

        div.innerHTML = `
            ${data.memberName}
            <button onclick="window.del('${id}')" class="text-red-500 ml-3">Delete</button>
            <button onclick="window.mark('${id}', true)">P</button>
            <button onclick="window.mark('${id}', false)">A</button>
            <select id="reason-${id}">
                <option value="">Reason</option>
                <option>Medical</option>
                <option>Business</option>
            </select>
        `;

        listContainer.appendChild(div);
    });
}

// DELETE
window.del = async (id) => {
    await deleteDoc(doc(db, "members", id));
    loadData();
};

// MARK ATTENDANCE
window.mark = (id, present) => {
    state[id].present = present;
};

// SUBMIT ATTENDANCE
document.getElementById("attendance-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const batch = writeBatch(db);
    const teamId = localStorage.getItem("teamId");

    for (let id in state) {
        const ref = doc(collection(db, "attendance"));

        batch.set(ref, {
            memberId: id,
            memberName: state[id].name,
            teamId,
            status: state[id].present ? "Present" : "Absent",
            reason: document.getElementById(`reason-${id}`).value || "",
            timestamp: serverTimestamp()
        });
    }

    try {
        await batch.commit();
        alert("Attendance Submitted");
        location.reload();
    } catch (err) {
        alert(err.message);
    }
});

// LOGOUT
document.getElementById("logout-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    await signOut(auth);
    localStorage.clear();
    window.location.href = "./login.html";
});

// INIT
loadData();

</script>

</body>
</html>
