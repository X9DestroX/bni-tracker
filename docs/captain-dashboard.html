<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captain Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="p-4 flex justify-between bg-white shadow">
  <h1 class="font-bold">BNI MC Tracker</h1>
  <button id="logout-btn" class="text-red-500">Logout</button>
</div>

<div class="p-4">
  <input id="new-member-name" placeholder="Member Name" class="border p-2">
  <button id="add-member-btn" class="bg-black text-white px-4 py-2">Add</button>
</div>

<div id="member-list" class="p-4"></div>

<div class="fixed bottom-0 left-0 right-0 p-4 bg-white">
  <button id="submit-btn" class="bg-red-500 text-white w-full py-3">Submit Team Attendance</button>
</div>

<script type="module">
import { db, auth } from './db/firebase-config.js';
import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  collection, addDoc, getDocs, query, where,
  deleteDoc, doc, writeBatch, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const listContainer = document.getElementById("member-list");
const state = {};

// Ensure teamId exists
if (!localStorage.getItem("teamId")) {
  localStorage.setItem("teamId", "TEAM1");
}

// ADD MEMBER
document.getElementById("add-member-btn").onclick = async () => {
  const name = document.getElementById("new-member-name").value.trim();
  const teamId = localStorage.getItem("teamId");

  if (!name) return alert("Enter name");

  try {
    await addDoc(collection(db, "members"), {
      memberName: name,
      teamId: teamId,
      createdAt: serverTimestamp()
    });

    document.getElementById("new-member-name").value = "";
    loadData();
    alert("Member added");
  } catch (err) {
    alert(err.message);
  }
};

// LOAD MEMBERS
async function loadData() {
  const teamId = localStorage.getItem("teamId");

  const q = query(collection(db, "members"), where("teamId", "==", teamId));
  const snap = await getDocs(q);

  listContainer.innerHTML = "";

  snap.forEach(docSnap => {
    const data = docSnap.data();
    const id = docSnap.id;

    state[id] = { present: true, name: data.memberName };

    const div = document.createElement("div");
    div.innerHTML = `
      <div class="bg-white p-3 mb-2">
        ${data.memberName}
        <button onclick="window.del('${id}')" class="text-red-500 ml-3">Delete</button>
        <button onclick="window.mark('${id}', true)">P</button>
        <button onclick="window.mark('${id}', false)">A</button>
        <select id="reason-${id}">
          <option value="">Reason</option>
          <option>Medical</option>
          <option>Business</option>
        </select>
      </div>
    `;
    listContainer.appendChild(div);
  });
}

window.del = async (id) => {
  await deleteDoc(doc(db, "members", id));
  loadData();
};

window.mark = (id, present) => {
  state[id].present = present;
};

// SUBMIT ATTENDANCE
document.getElementById("submit-btn").onclick = async () => {
  const batch = writeBatch(db);
  const teamId = localStorage.getItem("teamId");

  for (let id in state) {
    const ref = doc(collection(db, "attendance"));
    batch.set(ref, {
      memberId: id,
      memberName: state[id].name,
      teamId,
      status: state[id].present ? "Present" : "Absent",
      reason: document.getElementById(`reason-${id}`).value || "",
      timestamp: serverTimestamp()
    });
  }

  try {
    await batch.commit();
    alert("Attendance Submitted");
  } catch (err) {
    alert(err.message);
  }
};

// LOGOUT
document.getElementById("logout-btn").onclick = async () => {
  await signOut(auth);
  localStorage.clear();
  window.location.href = "./login.html";
};

loadData();
</script>

</body>
</html>
